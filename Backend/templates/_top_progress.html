<!-- Slim animated top progress bar + smooth page-entry animations. Drop-in include. -->
<style>
.top-progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 100%;
    background: transparent;
    pointer-events: none;
    z-index: 10001;
    overflow: hidden;
    display: none;
}
.top-progress-bar.is-active { display: block; }
.top-progress-bar::before {
    content: "";
    position: absolute;
    top: 0;
    left: -40%;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent 0%, #6366f1 30%, #a855f7 70%, transparent 100%);
    box-shadow: 0 0 8px rgba(139, 92, 246, 0.55);
    animation: topProgressSlide 1.1s ease-in-out infinite;
}
@keyframes topProgressSlide {
    0%   { left: -40%; }
    100% { left: 100%; }
}

/* ---- Native View Transitions: smooth crossfade between pages where supported (Chrome/Edge). ---- */
@view-transition { navigation: auto; }
::view-transition-old(root),
::view-transition-new(root) {
    animation-duration: 320ms;
    animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}
::view-transition-old(root) { animation-name: pageFadeOut; }
::view-transition-new(root) { animation-name: pageFadeIn; }
@keyframes pageFadeOut {
    to { opacity: 0; transform: translateY(-6px); }
}
@keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(8px); }
}

/* ---- Page-entry animation for non-VT browsers (Firefox/older Safari) and as a polish layer. ----
       Targets the main content wrappers across the site and the top nav. */
.page-enter,
body > nav,
nav.blog-nav,
.contact-shell,
main.how-wrap,
.blog-article {
    animation: pageEnter 480ms cubic-bezier(0.22, 1, 0.36, 1) both;
    will-change: transform, opacity;
}
.contact-shell > .contact-hero,
main.how-wrap > h1,
.blog-article > h1 {
    animation: pageEnterDelay 560ms cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 60ms;
}
.contact-shell > .contact-card,
.contact-shell > .contact-grid,
main.how-wrap > section,
main.how-wrap > p,
main.how-wrap > ul,
main.how-wrap > h2,
.blog-article > section,
.blog-article > p,
.blog-article > ul,
.blog-article > h2,
.blog-article > h3 {
    animation: pageEnterDelay 620ms cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 120ms;
}
@keyframes pageEnter {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0);    }
}
@keyframes pageEnterDelay {
    from { opacity: 0; transform: translateY(16px); filter: blur(2px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0);  }
}

@media (prefers-reduced-motion: reduce) {
    .top-progress-bar::before,
    .page-enter,
    body > nav,
    nav.blog-nav,
    .contact-shell,
    main.how-wrap,
    .blog-article,
    .contact-shell > *,
    main.how-wrap > *,
    .blog-article > * {
        animation: none !important;
    }
    ::view-transition-old(root),
    ::view-transition-new(root) {
        animation: none !important;
    }
}
</style>
<div id="topProgressBar" class="top-progress-bar" aria-hidden="true"></div>
<script>
(function () {
    var bar = document.getElementById("topProgressBar");
    if (!bar) return;
    function show() { bar.classList.add("is-active"); }
    function hide() { bar.classList.remove("is-active"); }
    function isInternalLink(a) {
        if (!a || !a.href) return false;
        if (a.target && a.target !== "" && a.target !== "_self") return false;
        if (a.hasAttribute("download")) return false;
        if (a.dataset && a.dataset.noProgress === "1") return false;
        var href = a.getAttribute("href") || "";
        if (!href || href.charAt(0) === "#") return false;
        if (/^(mailto:|tel:|javascript:)/i.test(href)) return false;
        try {
            var url = new URL(a.href, window.location.href);
            if (url.origin !== window.location.origin) return false;
            if (url.pathname === window.location.pathname && url.hash && url.search === window.location.search) return false;
            return true;
        } catch (e) { return false; }
    }
    document.addEventListener("click", function (e) {
        if (e.defaultPrevented || e.button !== 0) return;
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        var a = e.target.closest && e.target.closest("a[href]");
        if (!isInternalLink(a)) return;
        show();
    }, true);
    document.addEventListener("submit", function (e) {
        var form = e.target;
        if (!form || form.tagName !== "FORM") return;
        if (form.dataset && form.dataset.noProgress === "1") return;
        var method = (form.method || "get").toLowerCase();
        if (method === "get" && (!form.action || form.action === window.location.href)) return;
        show();
    }, true);
    window.addEventListener("pageshow", function (e) { if (e.persisted) hide(); });
    window.addEventListener("pagehide", hide);
})();
</script>
